<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | NIN & JAMB Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 16px;
      font-size: 14px;
    }

    nav a:hover { color: white; }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #e94560;
      background: white;
    }

    .btn {
      width: 100%;
      background: #e94560;
      color: white;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn:hover { background: #c73652; }

    .bottom-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .bottom-link a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .message.error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
    .message.success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }

    footer {
      background: #1a1a2e;
      color: #aaa;
      text-align: center;
      padding: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <header>
    <h1>NIN & JAMB Services</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <div class="page">
    <div class="card">
      <h2>Welcome Back</h2>
      <p>Login to track your service requests.</p>

      <div class="message" id="msg"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn" onclick="handleLogin()">Login</button>

      <div class="bottom-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 NIN & JAMB Services. All rights reserved.</p>
  </footer>

  <script>
    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMsg('Please enter your email and password.', 'error');
        return;
      }

      const saved = localStorage.getItem('nin_user');
      if (!saved) {
        showMsg('No account found. Please register first.', 'error');
        return;
      }

      const user = JSON.parse(saved);

      if (user.email !== email || user.password !== password) {
        showMsg('Incorrect email or password.', 'error');
        return;
      }

      localStorage.setItem('nin_logged_in', 'true');
      showMsg('Login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    }
  </script>

</body>
          </html>
